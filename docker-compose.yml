services:

  mariadb:
    image: mariadb:10.11
    container_name: smartdocs-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "${DB_PORT}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  glpi:
    image: diouxx/glpi
    container_name: smartdocs-glpi
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      VERSION_GLPI: ${VERSION_GLPI}
      MARIADB_HOST: mariadb
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      # Plugin montado ao vivo — editar aqui = reflete imediatamente no GLPI
      # GLPI 10.x procura plugins em <glpi_dir>/plugins (docroot: /var/www/html/glpi/public)
      - ./plugins/smartdocs:/var/www/html/glpi/plugins/smartdocs
      # Persistência dos arquivos do GLPI (uploads, cache, logs)
      - glpi_files:/var/www/html/glpi/files
      - glpi_config:/var/www/html/glpi/config
    ports:
      - "${GLPI_PORT}:80"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: smartdocs-pma
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_USER: ${MARIADB_USER}
      PMA_PASSWORD: ${MARIADB_PASSWORD}
      UPLOAD_LIMIT: 64M
    ports:
      - "${PMA_PORT}:80"

volumes:
  mariadb_data:
  glpi_files:
  glpi_config:
